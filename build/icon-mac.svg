<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- macOS 新方块样式：1024 画布，824 squircle（rx≈22.4%）居中，四周留白；浅色渐变底（深色外观由 macOS 图标机制按系统偏好处理） + 居中橙系 logo -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="1" stop-color="#dcdce1"/>
    </linearGradient>
    <radialGradient id="sqYellow" gradientUnits="userSpaceOnUse" cx="256" cy="128" r="110">
      <stop offset="0" stop-color="#ffaa33"/>
      <stop offset="1" stop-color="#ffd08a"/>
    </radialGradient>
    <radialGradient id="sqOrange" gradientUnits="userSpaceOnUse" cx="366.851" cy="320" r="110">
      <stop offset="0" stop-color="#ff7a1f"/>
      <stop offset="1" stop-color="#ffae70"/>
    </radialGradient>
    <radialGradient id="sqRed" gradientUnits="userSpaceOnUse" cx="145.149" cy="320" r="110">
      <stop offset="0" stop-color="#ff5424"/>
      <stop offset="1" stop-color="#ff9573"/>
    </radialGradient>
    <linearGradient id="link" gradientUnits="userSpaceOnUse" x1="256" y1="80" x2="256" y2="344">
      <stop offset="0" stop-color="#ffaa33"/>
      <stop offset="0.55" stop-color="#ff7a1f"/>
      <stop offset="1" stop-color="#ff5424"/>
    </linearGradient>
    <mask id="barCut" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <rect width="512" height="512" fill="white"/>
      <rect x="232"     y="79"  width="48" height="8" rx="4" fill="black"/>
      <rect x="342.851" y="271" width="48" height="8" rx="4" fill="black"/>
      <rect x="121.149" y="271" width="48" height="8" rx="4" fill="black"/>
    </mask>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="184" fill="url(#bg)"/>

  <g transform="translate(212,236) scale(1.171875)">
    <g mask="url(#barCut)">
      <polygon points="256,80 408.420,344 103.580,344"
               fill="none" stroke="url(#link)" stroke-width="24" stroke-linejoin="round"/>
      <polygon points="256,192 311.426,288 200.574,288"
               fill="url(#link)" stroke="url(#link)" stroke-width="24" stroke-linejoin="round"/>
      <rect x="184"     y="56"  width="144" height="144" rx="16" fill="url(#sqYellow)"/>
      <rect x="294.851" y="248" width="144" height="144" rx="16" fill="url(#sqOrange)"/>
      <rect x="73.149"  y="248" width="144" height="144" rx="16" fill="url(#sqRed)"/>
    </g>
  </g>
</svg>
